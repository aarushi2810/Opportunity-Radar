services:
  - type: web
    name: opportunity-radar
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: opportunity-radar-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: opportunity-radar-cache
          property: connectionString
      - key: ALPHA_VANTAGE_KEY
        sync: false
      - key: DEMO_MODE
        value: false
      - key: FILING_POLL_INTERVAL
        value: 900
      - key: MARKET_DATA_CACHE_TTL
        value: 60
      - key: SIGNAL_THRESHOLD
        value: "0.65"
      - key: HUMAN_REVIEW_THRESHOLD
        value: "0.70"

databases:
  - name: opportunity-radar-db
    databaseName: opportunity_radar
    user: opportunity_radar
    plan: free

  - name: opportunity-radar-cache
    type: redis
    plan: free
    ipAllowList: []
